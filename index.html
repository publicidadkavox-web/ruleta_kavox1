<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruleta de Premios - Parche Mundialista</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(15, 15, 26, 0.75), rgba(15, 15, 26, 0.75)), 
                        url('https://i.postimg.cc/Pfc4XsmY/AGUILA1-KAVOX.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Pantalla de bloqueo total (Simulación de cierre) */
        #pantalla-cierre {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0f0f16;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #pantalla-cierre h2 {
            color: #ECC000;
            font-size: 3rem;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(236, 192, 0, 0.4);
        }

        .subtexto-cierre {
            font-size: 1.5rem;
            color: #b0bec5;
            padding: 0 20px;
        }

        /* VENTANA EMERGENTE DE PREMIO (POPUP) */
        #anuncio-premio {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 15, 0.95);
            z-index: 90;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .caja-premio {
            background: #1e1e2f;
            border: 3px solid #ECC000;
            padding: 40px 30px;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(236, 192, 0, 0.4);
            max-width: 90%;
            width: 450px;
            transform: scale(0.7);
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .caja-premio h2 {
            color: #ECC000;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(236, 192, 0, 0.5);
        }

        .caja-premio .emoji-animado {
            font-size: 4.5rem;
            margin: 15px 0;
            animation: rebote 1s infinite alternate;
        }

        .caja-premio .texto-ganado {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            margin: 15px 0;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }

        .caja-premio .boton-cerrar-premio {
            margin-top: 20px;
            padding: 10px 30px;
            background: #ECC000;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .caja-premio .boton-cerrar-premio:hover {
            transform: scale(1.05);
        }

        h1 {
            margin-bottom: 20px;
            color: #ECC000;
            text-shadow: 0 0 15px rgba(236, 192, 0, 0.6);
            font-size: 2.2rem;
            text-align: center;
            padding: 0 15px;
            font-weight: 800;
        }

        .contenedor-ruleta {
            position: relative;
            width: 360px;
            height: 360px;
            margin-bottom: 30px;
        }

        .marcador {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ECC000;
            z-index: 10;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.8), 0 0 45px rgba(236, 192, 0, 0.25);
            transition: transform 7s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        .boton-girar {
            padding: 16px 60px;
            font-size: 1.7rem;
            font-weight: 900;
            color: #000000;
            background: #ECC000;
            border: 2px solid #ECC000;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(236, 192, 0, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .boton-girar:hover:not(:disabled) {
            transform: scale(1.06);
            box-shadow: 0 0 30px rgba(236, 192, 0, 0.7), inset 0 0 15px rgba(255, 255, 255, 0.5);
            background: #ffd32a;
        }

        .boton-girar:disabled {
            background: #444 !important;
            border-color: #444 !important;
            color: #888 !important;
            cursor: not-allowed;
            box-shadow: none !important;
            transform: none !important;
        }

        .resultado {
            margin-top: 25px;
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 42px;
            color: #ECC000;
            text-shadow: 0 0 12px rgba(236, 192, 0, 0.4);
            text-align: center;
            padding: 0 20px;
        }

        .contador {
            font-size: 1.2rem;
            color: #b0bec5;
            margin-top: 12px;
            font-style: italic;
            min-height: 24px;
        }

        .btn-reset-oculto {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            background: transparent;
            border: none;
            outline: none;
            cursor: default;
            z-index: 110;
        }

        /* ANIMACIONES CSS */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popUp {
            to { transform: scale(1); }
        }

        @keyframes rebote {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <!-- PANTALLA BLOQUEO FINAL -->
    <div id="pantalla-cierre">
        <h2>🔒 OPORTUNIDAD FINALIZADA</h2>
        <div class="subtexto-cierre">YA HAS PARTICIPADO EN LA RULETA DEL PARCHE. ¡GRACIAS POR JUGAR!</div>
    </div>

    <!-- POPUP DE ANUNCIO DE PREMIO -->
    <div id="anuncio-premio">
        <div class="caja-premio">
            <h2 id="titulo-anuncio">🎉 ¡FELICIDADES! 🎉</h2>
            <div class="emoji-animado" id="emoji-anuncio">🏆</div>
            <div class="texto-ganado" id="texto-premio-anuncio">FLETE GRATIS</div>
            <button class="boton-cerrar-premio" onclick="cerrarAnuncio()">Entendido</button>
        </div>
    </div>

    <h1>🏆 RULETA GANADORA KAVOX 🏆</h1>

    <div class="contenedor-ruleta">
        <div class="marcador"></div>
        <canvas id="ruleta" width="450" height="450"></canvas>
    </div>

    <button class="boton-girar" id="btnGirar">¡GIRAR!</button>
    <div class="resultado" id="resultado"></div>
    <div class="contador" id="contador"></div>

    <button class="btn-reset-oculto" onclick="reiniciarMemoria()"></button>

    <script>
        const canvas = document.getElementById('ruleta');
        const ctx = canvas.getContext('2d');
        const btnGirar = document.getElementById('btnGirar');
        const resultadoTxt = document.getElementById('resultado');
        const contadorTxt = document.getElementById('contador');
        const pantallaCierre = document.getElementById('pantalla-cierre');
        
        // Elementos del nuevo anuncio emergente
        const anuncioPremio = document.getElementById('anuncio-premio');
        const tituloAnuncio = document.getElementById('titulo-anuncio');
        const emojiAnuncio = document.getElementById('emoji-anuncio');
        const textoPremioAnuncio = document.getElementById('texto-premio-anuncio');

        const premios = [
            "5% DE DESCUENTO", 
            "10% DE DESCUENTO", 
            "FLETE GRATIS", 
            "GIRA DE NUEVO", 
            "NO GANASTE"
        ];
        const numSectores = premios.length;
        const anguloSector = (2 * Math.PI) / numSectores;
        
        const coloresSectores = ["#11998e", "#38ef7d", "#ff9900", "#ea2027", "#b0bec5"];

        let anguloActual = 0;

        function dibujarRuleta() {
            const centro = canvas.width / 2;
            const radio = centro - 15;

            for (let i = 0; i < numSectores; i++) {
                const anguloInicio = i * anguloSector;
                const anguloFin = anguloInicio + anguloSector;

                ctx.beginPath();
                ctx.moveTo(centro, centro);
                ctx.arc(centro, centro, radio, anguloInicio, anguloFin);
                ctx.fillStyle = coloresSectores[i % coloresSectores.length];
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#1e1e2f';
                ctx.stroke();

                ctx.save();
                ctx.translate(centro, centro);
                
                ctx.rotate(anguloInicio + anguloSector / 2);
                ctx.translate(radio - 100, 0);
                ctx.rotate(Math.PI);
                
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#ffffff";
                
                ctx.font = "bold 20px 'Segoe UI', sans-serif";
                ctx.shadowColor = "rgba(0, 0, 0, 0.85)";
                ctx.shadowBlur = 6;
                
                ctx.fillText(premios[i], 0, 0);
                ctx.restore();
            }

            ctx.beginPath();
            ctx.arc(centro, centro, 25, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#000000';
            ctx.stroke();
        }

        function verificarEstado() {
            if (localStorage.getItem('ruletaJugada') === 'true') {
                pantallaCierre.style.display = 'flex';
                btnGirar.disabled = true;
            } else {
                pantallaCierre.style.display = 'none';
                anuncioPremio.style.display = 'none';
                btnGirar.disabled = false;
                resultadoTxt.innerText = "";
                contadorTxt.innerText = "";
                canvas.style.transition = "none";
                anguloActual = 0;
                canvas.style.transform = `rotate(0rad)`;
            }
        }

        function iniciarCuentaRegresiva() {
            let segundosRestantes = 10;
            
            const intervalo = setInterval(() => {
                segundosRestantes--;
                if (segundosRestantes > 0) {
                    contadorTxt.innerText = `LA APLICACIÓN SE CERRARÁ EN ${segundosRestantes} SEGUNDOS...`;
                } else {
                    clearInterval(intervalo);
                    anuncioPremio.style.display = 'none'; // Cerramos anuncio si sigue abierto antes del bloqueo total
                    pantallaCierre.style.display = 'flex';
                }
            }, 1000);
        }

        function mostrarAnuncioPremio(premio) {
            if (premio === "NO GANASTE") {
                tituloAnuncio.innerText = "¡GRACIAS POR JUGAR!";
                emojiAnuncio.innerText = "👍";
                textoPremioAnuncio.innerText = "No hubo suerte esta vez. ¡Sigue conectado con KAVOX!";
            } else {
                tituloAnuncio.innerText = "🎉 ¡FELICIDADES! 🎉";
                emojiAnuncio.innerText = premio === "FLETE GRATIS" ? "🚚" : "🎁";
                textoPremioAnuncio.innerText = `HAS GANADO:\n${premio}`;
            }
            anuncioPremio.style.display = 'flex';
        }

        function cerrarAnuncio() {
            anuncioPremio.style.display = 'none';
        }

        function girar() {
            btnGirar.disabled = true;
            resultadoTxt.innerText = "¡MUCHA SUERTE...!";

            const vueltas = 8 + Math.floor(Math.random() * 5);
            const gradosAleatorios = Math.random() * 360;
            const gradosTotales = (vueltas * 360) + gradosAleatorios;
            
            anguloActual += (gradosTotales * Math.PI) / 180;
            canvas.style.transition = "transform 7s cubic-bezier(0.1, 0.8, 0.25, 1)";
            canvas.style.transform = `rotate(${anguloActual}rad)`;

            setTimeout(() => {
                const anguloNeto = anguloActual % (2 * Math.PI);
                let anguloMarcador = (3 * Math.PI / 2) - anguloNeto;
                if (anguloMarcador < 0) anguloMarcador += 2 * Math.PI;

                const indiceGanador = Math.floor(anguloMarcador / anguloSector) % numSectores;
                const premioGanado = premios[indiceGanador];

                if (premioGanado === "GIRA DE NUEVO") {
                    resultadoTxt.innerHTML = "🔄 ¡GIRA DE NUEVO! TIENES UN INTENTO EXTRA.";
                    btnGirar.disabled = false;
                    return; 
                }

                localStorage.setItem('ruletaJugada', 'true');

                // Mostrar el texto tradicional abajo
                if (premioGanado === "NO GANASTE") {
                    resultadoTxt.innerHTML = "❌ NO HUBO SUERTE ESTA VEZ. ¡GRACIAS POR PARTICIPAR!";
                } else {
                    resultadoTxt.innerHTML = `🎉 ¡GANASTE: <strong>${premioGanado}</strong>! 🎉`;
                }

                // MOSTRAR ANUNCIO GIGANTE EN PANTALLA
                mostrarAnuncioPremio(premioGanado);

                contadorTxt.innerText = "LA APLICACIÓN SE CERRARÁ EN 10 SEGUNDOS...";
                iniciarCuentaRegresiva();

            }, 7000);
        }

        function reiniciarMemoria() {
            localStorage.removeItem('ruletaJugada');
            verificarEstado();
        }

        // Inicializar
        dibujarRuleta();
        verificarEstado();
        btnGirar.addEventListener('click', girar);
    </script>
</body>
</html>
